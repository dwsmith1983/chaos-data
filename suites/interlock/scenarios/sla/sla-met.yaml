name: sla-met
description: Pipeline completes within SLA deadline; positive test
category: orchestrator
severity: low
version: 1
capability: sla/sla_met
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-phantom-sensor
  params:
    pipeline: "bronze-cdr"
    sensor_key: "hourly-status"
    status: "COMPLETE"
    sensor_count: "1000"
setup:
  pipeline: bronze-cdr
  trigger_status: COMPLETED
  pipeline_config:
    sla:
      deadline: "06:00"
      warning_minutes: 30
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: true
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "SLA_MET"
      condition: exists
