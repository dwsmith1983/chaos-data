name: sla-breach
description: Pipeline exceeds SLA deadline; should emit breach event
category: orchestrator
severity: critical
version: 1
capability: sla/sla_breach
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-timestamp-forgery
  params:
    pipeline: "bronze-cdr"
    sensor_key: "hourly-status"
    field: "schedule_time"
    offset: "-7200s"
setup:
  pipeline: bronze-cdr
  pipeline_config:
    sla:
      deadline: "00:01"
      warning_minutes: 30
  sensors:
    hourly-status:
      status: PENDING
      sensor_count: 0
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: true
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "SLA_BREACH"
      condition: exists
