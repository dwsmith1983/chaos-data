name: sla-warning
description: Pipeline approaches SLA deadline; should emit warning event
category: orchestrator
severity: moderate
version: 1
capability: sla/sla_warning
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-timestamp-forgery
  params:
    pipeline: "bronze-cdr"
    field: "schedule_time"
    offset: "-3500s"
setup:
  pipeline: bronze-cdr
  pipeline_config:
    sla:
      deadline: "06:00"
      warning_minutes: 30
  sensors:
    hourly-status:
      status: PENDING
      sensor_count: 0
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: true
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "SLA_WARNING"
      condition: exists
