name: pipeline-excluded
description: Calendar exclusion prevents pipeline from running on excluded date
category: orchestrator
severity: severe
version: 1
capability: safety/pipeline_excluded
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-phantom-trigger
  params:
    pipeline: "bronze-cdr"
    job_type: "step-function"
setup:
  pipeline: bronze-cdr
  pipeline_config:
    schedule:
      type: exclusion_calendar
      excluded_dates: ["2026-03-27"]
    job:
      type: step-function
      state_machine_arn: "arn:aws:states:us-east-1:123456789:stateMachine:bronze-cdr"
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "PIPELINE_EXCLUDED"
      condition: exists
