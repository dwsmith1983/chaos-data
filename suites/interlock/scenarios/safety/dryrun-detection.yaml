name: dryrun-detection
description: Dry-run post-run detection events are emitted correctly
category: state-consistency
severity: moderate
version: 1
capability: safety/dryrun_detection
target:
  layer: state
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-phantom-sensor
  params:
    pipeline: "bronze-cdr"
    sensor_key: "hourly-status"
    sensor_count: "1500"
setup:
  pipeline: bronze-cdr
  trigger_status: COMPLETED
  pipeline_config:
    dryrun: true
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "DRY_RUN_DRIFT"
      condition: exists
