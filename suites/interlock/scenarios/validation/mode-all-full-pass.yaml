name: validation-mode-all-full-pass
description: Two rules with mode ALL — both pass (equals COMPLETE and gte 10 with value 15) — should trigger job
category: state-consistency
severity: moderate
version: 1
capability: validation/mode_all
target:
  layer: state
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-phantom-sensor
  params:
    pipeline: "silver-events"
    sensor_key: "event-counter"
    status: "COMPLETE"
    sensor_count: "15"
setup:
  pipeline: silver-events
  pipeline_config:
    pipeline: { id: silver-events }
    validation:
      trigger: "ALL"
      rules:
        - key: "SENSOR#hourly-status"
          check: equals
          field: status
          value: "COMPLETE"
        - key: "SENSOR#event-counter"
          check: gte
          field: sensor_count
          value: "10"
    job: { type: command, config: { command: "echo test" } }
    schedule: { evaluation: { window: "1h", interval: "5m" } }
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
    event-counter:
      status: COMPLETE
      sensor_count: 15
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "JOB_TRIGGERED"
      condition: exists
