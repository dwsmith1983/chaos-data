name: validation-equals-pass
description: Phantom sensor writes status COMPLETE matching the equals rule — should trigger job
category: state-consistency
severity: moderate
version: 1
capability: validation/equals
target:
  layer: state
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-phantom-sensor
  params:
    pipeline: "bronze-cdr"
    sensor_key: "hourly-status"
    status: "COMPLETE"
setup:
  pipeline: bronze-cdr
  pipeline_config:
    pipeline: { id: bronze-cdr }
    validation:
      trigger: "ALL"
      rules:
        - key: "SENSOR#hourly-status"
          check: equals
          field: status
          value: "COMPLETE"
    job: { type: command, config: { command: "echo test" } }
    schedule: { evaluation: { window: "1h", interval: "5m" } }
  sensors:
    hourly-status:
      status: PENDING
      sensor_count: 0
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "JOB_TRIGGERED"
      condition: exists
