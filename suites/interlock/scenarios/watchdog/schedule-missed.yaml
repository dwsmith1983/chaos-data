name: schedule-missed
description: Cron schedule window passes without pipeline execution starting
category: orchestrator
severity: severe
version: 1
capability: watchdog/schedule_missed
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-timestamp-forgery
  params:
    pipeline: "bronze-cdr"
    field: "last_schedule_time"
    offset: "-7200s"
setup:
  pipeline: bronze-cdr
  pipeline_config:
    schedule:
      cron: "0 * * * *"
      tolerance_minutes: 30
  sensors:
    hourly-status:
      status: PENDING
      sensor_count: 0
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "SCHEDULE_MISSED"
      condition: exists
