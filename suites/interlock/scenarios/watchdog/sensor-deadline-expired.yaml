name: sensor-deadline-expired
description: Trigger sensor deadline passes without sensor arrival
category: state-consistency
severity: critical
version: 1
capability: watchdog/sensor_deadline_expired
target:
  layer: state
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-stale-sensor
  params:
    pipeline: "bronze-cdr"
    sensor_key: "hourly-status"
    age: "7200s"
setup:
  pipeline: bronze-cdr
  pipeline_config:
    sensor_deadline: "05:00"
  sensors:
    hourly-status:
      status: PENDING
      sensor_count: 0
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 60s
  asserts:
    - type: interlock_event
      target: "SENSOR_DEADLINE_EXPIRED"
      condition: exists
