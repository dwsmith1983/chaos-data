name: sfn-timeout
description: Step Functions execution exceeds timeout threshold
category: orchestrator
severity: critical
version: 1
capability: watchdog/sfn_timeout
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-timestamp-forgery
  params:
    pipeline: "bronze-cdr"
    sensor_key: "hourly-status"
    field: "trigger_time"
    offset: "-3700s"
setup:
  pipeline: bronze-cdr
  trigger_status: RUNNING
  pipeline_config:
    job:
      type: step-function
      state_machine_arn: "arn:aws:states:us-east-1:123456789:stateMachine:bronze-cdr"
      timeout_seconds: 3600
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "SFN_TIMEOUT"
      condition: exists
