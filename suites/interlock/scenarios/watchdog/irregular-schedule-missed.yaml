name: irregular-schedule-missed
description: Inclusion calendar date passes without pipeline execution
category: orchestrator
severity: severe
version: 1
capability: watchdog/irregular_schedule_missed
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-timestamp-forgery
  params:
    pipeline: "bronze-cdr"
    field: "last_schedule_time"
    offset: "-86400s"
setup:
  pipeline: bronze-cdr
  pipeline_config:
    schedule:
      type: inclusion_calendar
      dates: ["2026-03-27"]
      tolerance_minutes: 60
  sensors:
    hourly-status:
      status: PENDING
      sensor_count: 0
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "IRREGULAR_SCHEDULE_MISSED"
      condition: exists
