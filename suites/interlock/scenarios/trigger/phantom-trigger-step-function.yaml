name: phantom-trigger-step-function
description: Fire Step Functions trigger without dependencies met; validation should block it
category: orchestrator
severity: severe
version: 1
capability: trigger_types/step-function
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-phantom-trigger
  params:
    pipeline: "bronze-cdr"
    job_type: "step-function"
setup:
  pipeline: bronze-cdr
  pipeline_config:
    job:
      type: step-function
      state_machine_arn: "arn:aws:states:us-east-1:123456789:stateMachine:bronze-cdr"
  sensors:
    hourly-status:
      status: PENDING
      sensor_count: 0
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "VALIDATION_EXHAUSTED"
      condition: exists
