name: drift-inflight
description: Sensor count changes while job is still running; detect inflight drift
category: state-consistency
severity: severe
version: 1
capability: post_run/post_run_drift_inflight
target:
  layer: state
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-phantom-sensor
  params:
    pipeline: "bronze-cdr"
    sensor_key: "hourly-status"
    sensor_count: "1500"
setup:
  pipeline: bronze-cdr
  trigger_status: RUNNING
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "POST_RUN_DRIFT_INFLIGHT"
      condition: exists
