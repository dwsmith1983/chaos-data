name: baseline-capture-failed
description: Baseline snapshot fails to record after job trigger
category: state-consistency
severity: severe
version: 1
capability: post_run/baseline_capture_failed
target:
  layer: state
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-stale-sensor
  params:
    pipeline: "bronze-cdr"
    sensor_key: "baseline-sensor"
    age: "7200s"
setup:
  pipeline: bronze-cdr
  trigger_status: COMPLETED
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "BASELINE_CAPTURE_FAILED"
      condition: exists
