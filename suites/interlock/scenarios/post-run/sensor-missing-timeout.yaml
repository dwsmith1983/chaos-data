name: sensor-missing-timeout
description: Post-run sensor never arrives within timeout window
category: state-consistency
severity: critical
version: 1
capability: post_run/post_run_sensor_missing
target:
  layer: state
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-stale-sensor
  params:
    pipeline: "bronze-cdr"
    sensor_key: "post-run-status"
    age: "3600s"
setup:
  pipeline: bronze-cdr
  trigger_status: COMPLETED
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 60s
  asserts:
    - type: interlock_event
      target: "POST_RUN_SENSOR_MISSING"
      condition: exists
