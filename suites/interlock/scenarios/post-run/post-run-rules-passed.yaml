name: post-run-rules-passed
description: Post-run validation rules pass; positive test confirming correct event
category: state-consistency
severity: low
version: 1
capability: post_run/post_run_passed
target:
  layer: state
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-phantom-sensor
  params:
    pipeline: "bronze-cdr"
    sensor_key: "post-run-status"
    status: "COMPLETE"
    sensor_count: "1000"
setup:
  pipeline: bronze-cdr
  trigger_status: COMPLETED
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
    post-run-status:
      status: PENDING
      sensor_count: 0
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "POST_RUN_PASSED"
      condition: exists
