name: dryrun-marker-dedup
description: Dry-run first-occurrence marker is idempotent on repeat invocations
category: orchestrator
severity: moderate
version: 1
capability: idempotency/dryrun_marker_dedup
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-phantom-trigger
  params:
    pipeline: "bronze-cdr"
    job_type: "step-function"
setup:
  pipeline: bronze-cdr
  pipeline_config:
    dryrun: true
    dryrun_marker_exists: true
    job:
      type: step-function
      state_machine_arn: "arn:aws:states:us-east-1:123456789:stateMachine:bronze-cdr"
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "DRY_RUN_WOULD_TRIGGER"
      condition: not_exists
