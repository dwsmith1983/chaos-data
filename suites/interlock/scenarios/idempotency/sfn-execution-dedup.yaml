name: sfn-execution-dedup
description: Duplicate Step Functions execution for same pipeline+schedule+date is deduplicated
category: orchestrator
severity: severe
version: 1
capability: idempotency/sfn_execution_dedup
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-phantom-trigger
  params:
    pipeline: "bronze-cdr"
    job_type: "step-function"
setup:
  pipeline: bronze-cdr
  trigger_status: COMPLETED
  pipeline_config:
    job:
      type: step-function
      state_machine_arn: "arn:aws:states:us-east-1:123456789:stateMachine:bronze-cdr"
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "JOB_TRIGGERED"
      condition: not_exists
