name: job-triggered
description: Job successfully triggered after all validations pass
category: orchestrator
severity: low
version: 1
capability: job_lifecycle/job_triggered
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-phantom-sensor
  params:
    pipeline: "bronze-cdr"
    sensor_key: "hourly-status"
    status: "COMPLETE"
    sensor_count: "1000"
setup:
  pipeline: bronze-cdr
  pipeline_config:
    job:
      type: step-function
      state_machine_arn: "arn:aws:states:us-east-1:123456789:stateMachine:bronze-cdr"
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "JOB_TRIGGERED"
      condition: exists
