name: job-terminal
description: Job killed mid-execution reaches terminal FAILED state
category: orchestrator
severity: critical
version: 1
capability: job_lifecycle/job_terminal
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-job-kill
  params:
    pipeline: "bronze-cdr"
    reason: "chaos-injection"
setup:
  pipeline: bronze-cdr
  trigger_status: RUNNING
  pipeline_config:
    job:
      type: step-function
      state_machine_arn: "arn:aws:states:us-east-1:123456789:stateMachine:bronze-cdr"
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "JOB_FAILED"
      condition: exists
