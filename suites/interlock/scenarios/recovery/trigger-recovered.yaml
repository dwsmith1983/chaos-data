name: trigger-recovered
description: Stale trigger recovered back to healthy state
category: orchestrator
severity: moderate
version: 1
capability: recovery/trigger_recovered
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-phantom-sensor
  params:
    pipeline: "bronze-cdr"
    sensor_key: "trigger-status"
    status: "COMPLETED"
setup:
  pipeline: bronze-cdr
  trigger_status: RUNNING
  pipeline_config:
    recovery:
      stale_threshold_minutes: 120
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "TRIGGER_RECOVERED"
      condition: exists
