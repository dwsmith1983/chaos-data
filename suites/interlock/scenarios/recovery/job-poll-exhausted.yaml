name: job-poll-exhausted
description: Job poll window exceeded without terminal state reached
category: orchestrator
severity: critical
version: 1
capability: recovery/job_poll_exhausted
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-timestamp-forgery
  params:
    pipeline: "bronze-cdr"
    sensor_key: "hourly-status"
    field: "trigger_time"
    offset: "-7300s"
setup:
  pipeline: bronze-cdr
  trigger_status: RUNNING
  pipeline_config:
    recovery:
      poll_timeout_minutes: 120
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "JOB_POLL_EXHAUSTED"
      condition: exists
