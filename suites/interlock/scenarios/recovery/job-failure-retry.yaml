name: job-failure-retry
description: Job fails and automatic retry fires via maxCodeRetries
category: orchestrator
severity: severe
version: 1
capability: recovery/job_failure_retry
target:
  layer: orchestrator
  filter: { prefix: "", match: "" }
mutation:
  type: interlock-false-success
  params:
    pipeline: "bronze-cdr"
    actual_status: "FAILED"
setup:
  pipeline: bronze-cdr
  trigger_status: RUNNING
  pipeline_config:
    recovery:
      max_code_retries: 3
      current_retries: 1
  sensors:
    hourly-status:
      status: COMPLETE
      sensor_count: 1000
probability: 1.0
safety:
  max_affected_pct: 100
  cooldown: 0s
  sla_aware: false
expected_response:
  within: 30s
  asserts:
    - type: interlock_event
      target: "JOB_FAILED"
      condition: exists
    - type: rerun_state
      target: "bronze-cdr"
      condition: exists
