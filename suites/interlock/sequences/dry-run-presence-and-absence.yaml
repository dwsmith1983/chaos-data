name: dry-run-presence-and-absence
description: Verify dry-run mode emits detection events but suppresses real operational events
capabilities:
  - safety/dryrun_detection
  - safety/dryrun_absence
steps:
  - name: setup-dryrun-pipeline
    setup:
      pipeline: bronze-cdr
      trigger_status: COMPLETED
      pipeline_config:
        dryrun: true
        job:
          type: step-function
          state_machine_arn: "arn:aws:states:us-east-1:123456789:stateMachine:bronze-cdr"
      sensors:
        hourly-status:
          status: COMPLETE
          sensor_count: 1000
  - name: verify-dryrun-detection
    scenario: scenarios/safety/dryrun-detection.yaml
    assert:
      - type: interlock_event
        target: "DRY_RUN_DRIFT"
        condition: exists
  - wait: "3s"
  - name: verify-operational-suppressed
    scenario: scenarios/safety/dryrun-absence.yaml
    assert:
      - type: interlock_event
        target: "DRY_RUN_WOULD_TRIGGER"
        condition: exists
      - type: interlock_event
        target: "JOB_TRIGGERED"
        condition: not_exists
