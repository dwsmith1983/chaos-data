# Interlock Chaos Testing Suite — Capability Registry
# 53 capabilities across 9 categories
# Each capability maps to one or more chaos scenarios that probe it.
# Status: COVERED (all scenarios pass), GAP (scenario fails), UNTESTED (no scenarios)

capabilities:
  validation:
    - id: equals
      description: Equals check on sensor field values
      scenarios: [validation/equals-fail-wrong-value.yaml, validation/equals-pass.yaml]
    - id: gte
      description: Field value >= threshold
      scenarios: [validation/gte-below-threshold.yaml]
    - id: lte
      description: Field value <= threshold
      scenarios: [validation/lte-above-threshold.yaml]
    - id: gt
      description: Field value > threshold
      scenarios: [validation/gt-at-boundary.yaml]
    - id: lt
      description: Field value < threshold
      scenarios: [validation/lt-at-boundary.yaml]
    - id: exists
      description: Sensor key exists in control table
      scenarios: [validation/exists-missing-sensor.yaml]
    - id: age_lt
      description: Sensor timestamp freshness check
      scenarios: [validation/age-lt-stale-sensor.yaml]
    - id: mode_all
      description: ALL validation rules must pass
      scenarios: [validation/mode-all-full-pass.yaml]
    - id: mode_any
      description: ANY validation rule must pass
      scenarios: [validation/mode-any-partial-pass.yaml]

  trigger_types:
    - id: http
      description: HTTP endpoint trigger
      scenarios: [trigger/phantom-trigger-http.yaml]
    - id: command
      description: Shell command trigger
      scenarios: [trigger/phantom-trigger-command.yaml]
    - id: airflow
      description: Apache Airflow DAG trigger
      scenarios: [trigger/phantom-trigger-airflow.yaml]
    - id: glue
      description: AWS Glue job trigger
      scenarios: [trigger/phantom-trigger-glue.yaml]
    - id: emr
      description: AWS EMR cluster trigger
      scenarios: [trigger/phantom-trigger-emr.yaml]
    - id: emr-serverless
      description: AWS EMR Serverless trigger
      scenarios: [trigger/phantom-trigger-emr-serverless.yaml]
    - id: step-function
      description: AWS Step Functions trigger
      scenarios: [trigger/phantom-trigger-step-function.yaml]
    - id: databricks
      description: Databricks job trigger
      scenarios: [trigger/phantom-trigger-databricks.yaml]
    - id: lambda
      description: AWS Lambda invocation trigger
      scenarios: [trigger/phantom-trigger-lambda.yaml]

  post_run:
    - id: post_run_drift
      description: Sensor count diverged after job completed
      scenarios: [post-run/drift-count-changed.yaml]
    - id: post_run_drift_inflight
      description: Drift detected while job still running
      scenarios: [post-run/drift-inflight.yaml]
    - id: post_run_passed
      description: Post-run validation rules passed
      scenarios: [post-run/post-run-rules-passed.yaml]
    - id: post_run_failed
      description: Post-run validation rules failed
      scenarios: [post-run/post-run-rules-failed.yaml]
    - id: post_run_sensor_missing
      description: Post-run sensor never arrived within timeout
      scenarios: [post-run/sensor-missing-timeout.yaml]
    - id: post_run_baseline_captured
      description: Baseline snapshot recorded after job trigger
      scenarios: [post-run/baseline-captured.yaml]
    - id: baseline_capture_failed
      description: Baseline snapshot failed to record
      scenarios: [post-run/baseline-capture-failed.yaml]

  sla:
    - id: sla_warning
      description: Approaching SLA deadline
      scenarios: [sla/sla-warning.yaml]
    - id: sla_breach
      description: SLA deadline exceeded
      scenarios: [sla/sla-breach.yaml]
    - id: sla_met
      description: Completed within SLA deadline
      scenarios: [sla/sla-met.yaml]
    - id: relative_sla_warning
      description: maxDuration warning threshold
      scenarios: [sla/relative-sla-warning.yaml]
    - id: relative_sla_breach
      description: maxDuration exceeded
      scenarios: [sla/relative-sla-breach.yaml]

  watchdog:
    - id: schedule_missed
      description: Cron schedule missed
      scenarios: [watchdog/schedule-missed.yaml]
    - id: irregular_schedule_missed
      description: Inclusion calendar date missed
      scenarios: [watchdog/irregular-schedule-missed.yaml]
    - id: sensor_deadline_expired
      description: Trigger sensor deadline passed without arrival
      scenarios: [watchdog/sensor-deadline-expired.yaml]
    - id: sfn_timeout
      description: Step Functions execution timeout
      scenarios: [watchdog/sfn-timeout.yaml]
    - id: stale_trigger
      description: Trigger stuck in non-terminal state
      scenarios: [watchdog/stale-trigger.yaml]

  recovery:
    - id: rerun_accepted
      description: Drift or manual rerun initiated
      scenarios: [recovery/rerun-accepted.yaml]
    - id: rerun_rejected
      description: Circuit breaker blocked rerun (maxDriftReruns/maxManualReruns)
      scenarios: [recovery/rerun-rejected.yaml]
    - id: retry_exhausted
      description: maxRetries exceeded
      scenarios: [recovery/retry-exhausted.yaml]
    - id: job_poll_exhausted
      description: Job poll window exceeded
      scenarios: [recovery/job-poll-exhausted.yaml]
    - id: job_failure_retry
      description: Automatic retry on job failure (maxCodeRetries)
      scenarios: [recovery/job-failure-retry.yaml]
    - id: trigger_recovered
      description: Stale trigger recovered
      scenarios: [recovery/trigger-recovered.yaml]

  idempotency:
    - id: sfn_execution_dedup
      description: Same pipeline+schedule+date no duplicate execution
      scenarios: [idempotency/sfn-execution-dedup.yaml]
    - id: sla_warning_suppression
      description: Warning suppressed if breach already fired
      scenarios: [idempotency/sla-warning-suppression.yaml]
    - id: sla_alert_suppression_terminal
      description: Alert suppressed when job completed/failed/timeout
      scenarios: [idempotency/sla-alert-suppression-terminal.yaml]
    - id: dryrun_marker_dedup
      description: Idempotent first-occurrence recording
      scenarios: [idempotency/dryrun-marker-dedup.yaml]

  safety:
    - id: pipeline_excluded
      description: Calendar exclusion enforced
      scenarios: [safety/pipeline-excluded.yaml]
    - id: inclusion_calendar
      description: Only runs on specified dates
      scenarios: [safety/inclusion-calendar.yaml]
    - id: dryrun_would_trigger
      description: Dry-run event emission without real job
      scenarios: [safety/dryrun-would-trigger.yaml]
    - id: dryrun_detection
      description: Dry-run post-run detection events
      scenarios: [safety/dryrun-detection.yaml]
    - id: dryrun_absence
      description: Real operational events NOT emitted in dry-run mode
      scenarios: [safety/dryrun-absence.yaml]

  job_lifecycle:
    - id: job_triggered
      description: Job successfully triggered
      scenarios: [job-lifecycle/job-triggered.yaml]
    - id: job_terminal
      description: Job completed or failed terminal states
      scenarios: [job-lifecycle/job-terminal.yaml]
    - id: validation_exhausted
      description: Evaluation window expired without rules passing
      scenarios: [job-lifecycle/validation-exhausted.yaml]
