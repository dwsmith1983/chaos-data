name: stale-date-replay
description: Re-deliver data for a historical date, simulating an accidental replay of already-processed data from upstream.
category: data-arrival
severity: moderate
version: 1

target:
  layer: data
  transport: ""
  filter:
    prefix: ""
    match: ""

mutation:
  type: stale-replay
  params:
    replay_date: "2024-01-15"

probability: 0.2

safety:
  max_affected_pct: 25
  cooldown: 20m
  sla_aware: true
