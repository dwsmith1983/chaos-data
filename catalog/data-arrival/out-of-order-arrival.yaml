name: out-of-order-arrival
description: Delay and release data files out of chronological order, simulating upstream systems delivering batches in a non-sequential fashion.
category: data-arrival
severity: low
version: 1

target:
  layer: data
  transport: ""
  filter:
    prefix: ""
    match: ""

mutation:
  type: out-of-order
  params:
    delay_older_by: "2h"
    partition_field: "par_hour"
    older_value: "13"
    newer_value: "14"

probability: 0.35

safety:
  max_affected_pct: 40
  cooldown: 10m
  sla_aware: true
